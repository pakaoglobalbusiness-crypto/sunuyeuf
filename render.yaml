# Blueprint Render — déploie toute la plateforme Gologui en un clic :
# API NestJS + PostgreSQL + back-office admin + app web mobile.
# Dashboard Render → New → Blueprint → sélectionner ce dépôt.

databases:
  - name: sunuyeuf-db
    plan: free # 30 jours gratuits, puis ~7 $/mois ou migration

services:
  # --- API backend ---
  - type: web
    name: gologui-api
    runtime: node
    rootDir: backend
    plan: free # s'endort après 15 min d'inactivité (réveil ~30 s)
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npm run start:render
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sunuyeuf-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # Mode démo : OTP affiché dans l'app, paiements simulés.
      # Passer à orange/paydunya avec les clés API pour le vrai lancement.
      - key: SMS_PROVIDER
        value: mock
      - key: PAYMENT_PROVIDER
        value: mock

  # --- Back-office admin ---
  - type: web
    name: gologui-admin
    runtime: static
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://gologui-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # --- App mobile (version web, pré-buildée localement dans webapp/) ---
  - type: web
    name: gologui-app
    runtime: static
    rootDir: webapp
    buildCommand: echo "fichiers pré-buildés par Flutter"
    staticPublishPath: .
